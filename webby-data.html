<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webby Data - Incoming Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --storm: #0A181C; --monday: #79E2FF; --day: #C7F8BA; --suede: #00A5D3; --electro: #221327; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--storm); min-height: 100vh; color: white; }
    .container { max-width: 1800px; margin: 0 auto; padding: 20px; }

    .nav { display: flex; gap: 12px; margin-bottom: 24px; }
    .nav a { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 8px; color: white; text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .nav a:hover { background: rgba(255,255,255,0.2); }
    .nav a.active { background: var(--monday); color: var(--storm); }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 28px; font-weight: 800; color: var(--monday); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .live { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--day); }
    .live-dot { width: 8px; height: 8px; background: var(--day); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .btn { padding: 10px 18px; background: var(--suede); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn:hover { background: var(--monday); color: var(--storm); }

    .filters { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; font-weight: 600; }
    select, input[type="date"], input[type="text"] { padding: 8px 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: white; font-size: 13px; font-family: 'Inter', sans-serif; }
    select:focus, input:focus { outline: none; border-color: var(--monday); }
    option { background: var(--storm); }

    .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .quick-btn { padding: 8px 14px; background: rgba(255,255,255,0.08); border: none; border-radius: 20px; font-size: 12px; color: white; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .quick-btn:hover, .quick-btn.active { background: var(--monday); color: var(--storm); }

    .table-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.6); }

    .table-wrapper { overflow-x: auto; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(0,0,0,0.4); position: sticky; top: 0; }
    th { padding: 14px 12px; text-align: left; font-size: 10px; font-weight: 700; color: var(--monday); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; border-bottom: 2px solid var(--monday); }
    td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; vertical-align: top; }
    tr:hover { background: rgba(121,226,255,0.03); }

    .caption-cell { max-width: 350px; }
    .caption-text { color: rgba(255,255,255,0.8); font-size: 12px; cursor: pointer; padding: 6px 10px; background: rgba(255,255,255,0.05); border-radius: 8px; transition: all 0.2s; }
    .caption-text:hover { background: rgba(121,226,255,0.1); }
    .truncate { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .keyword { color: var(--day); font-weight: 600; font-size: 12px; }
    .topic-tag { color: var(--suede); font-size: 11px; padding: 3px 8px; background: rgba(0,165,211,0.15); border-radius: 12px; display: inline-block; }
    .country-tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; display: inline-block; font-weight: 600; }
    .country-tag.uae { background: rgba(199,248,186,0.2); color: var(--day); }
    .country-tag.ksa { background: rgba(0,165,211,0.2); color: var(--suede); }
    .country-tag.bahrain { background: rgba(138,43,226,0.2); color: #b388ff; }
    .country-tag.oman { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .country-tag.qatar { background: rgba(255,215,0,0.2); color: #ffd700; }
    .country-tag.kuwait { background: rgba(121,226,255,0.2); color: var(--monday); }
    .country-tag.unknown { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .link-cell a { color: var(--suede); text-decoration: none; font-size: 12px; }
    .link-cell a:hover { color: var(--monday); text-decoration: underline; }
    .date { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
    .no-data { color: rgba(255,255,255,0.2); font-size: 12px; }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 5px 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; white-space: nowrap; }
    .action-btn.social-btn { background: rgba(138,43,226,0.15); color: #b388ff; border: 1px solid rgba(138,43,226,0.3); }
    .action-btn.social-btn:hover { background: #b388ff; color: var(--storm); }
    .action-btn.social-btn.active { background: #b388ff; color: var(--storm); }
    .action-btn.blog-btn { background: rgba(0,165,211,0.15); color: var(--suede); border: 1px solid rgba(0,165,211,0.3); }
    .action-btn.blog-btn:hover { background: var(--suede); color: white; }
    .action-btn.blog-btn.active { background: var(--suede); color: white; }

    .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 24px; padding: 20px; }
    .page-btn { padding: 10px 18px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: white; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .page-btn:hover:not(:disabled) { background: var(--monday); color: var(--storm); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 14px; color: rgba(255,255,255,0.6); }

    /* Content Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .content-modal { background: var(--storm); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 0; max-width: 800px; width: 95%; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 25px 80px rgba(0,0,0,0.6); }
    .content-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .content-modal-header h2 { color: var(--monday); font-size: 22px; font-weight: 700; }
    .content-modal-close { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .content-modal-close:hover { background: rgba(255,107,107,0.3); color: #ff6b6b; }
    .content-modal-body { padding: 28px; flex: 1; overflow-y: auto; }
    .content-modal-text { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.9); white-space: pre-wrap; word-wrap: break-word; max-height: 50vh; overflow-y: auto; }
    .content-modal-footer { padding: 20px 28px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 12px; }
    .copy-btn { padding: 12px 28px; background: var(--suede); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .copy-btn:hover { background: var(--monday); color: var(--storm); }
    .copy-btn.copied { background: var(--day); color: var(--storm); }

    .footer { text-align: center; padding: 24px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="statistics.html">📊 Statistics</a>
      <a href="workspace.html">📝 Workspace</a>
      <a href="instagram-reels.html">🎬 Instagram Reels</a>
      <a href="webby-data.html" class="active">🌐 Webby Data</a>
    </nav>

    <div class="header">
      <h1>🌐 Webby Data</h1>
      <div class="header-right">
        <div class="live"><div class="live-dot"></div> Live</div>
        <button class="btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Search</span>
        <input type="text" id="filter-search" placeholder="Caption, keyword, topic..." style="min-width: 200px;">
      </div>
      <div class="filter-group">
        <span class="filter-label">Topic</span>
        <input type="text" id="filter-topic" placeholder="e.g. concert, festival..." style="min-width: 150px;">
      </div>
      <div class="filter-group">
        <span class="filter-label">Country</span>
        <select id="filter-country">
          <option value="">All</option>
          <option value="UAE">🇦🇪 UAE</option>
          <option value="gcc_excl_uae">🌍 GCC excl UAE</option>
          <option value="Bahrain">🇧🇭 Bahrain</option>
          <option value="KSA">🇸🇦 KSA</option>
          <option value="Kuwait">🇰🇼 Kuwait</option>
          <option value="Qatar">🇶🇦 Qatar</option>
          <option value="Oman">🇴🇲 Oman</option>
          <option value="other">🌐 Other</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">From</span>
        <input type="date" id="filter-from">
      </div>
      <div class="filter-group">
        <span class="filter-label">To</span>
        <input type="date" id="filter-to">
      </div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickFilter('24h')">Last 24h</button>
        <button class="quick-btn" onclick="quickFilter('7d')">Last 7d</button>
        <button class="quick-btn" onclick="quickFilter('30d')">Last 30d</button>
        <button class="quick-btn" onclick="clearFilters()">✖ Clear</button>
      </div>
    </div>

    <div class="table-info">
      <span id="showing">Loading...</span>
      <span>Updated: <span id="updated-time">-</span></span>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Caption</th>
            <th>Link</th>
            <th>Keyword</th>
            <th>Topic</th>
            <th>Country</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div class="pagination">
      <button class="page-btn" id="prev-btn" onclick="changePage(-1)">← Previous</button>
      <span class="page-info" id="page-info">Page 1</span>
      <button class="page-btn" id="next-btn" onclick="changePage(1)">Next →</button>
    </div>

    <div class="footer">Incoming Links Dashboard — Webby Data • Auto-refresh every 2 min</div>
  </div>

  <!-- Content Modal -->
  <div class="modal-overlay" id="content-modal">
    <div class="content-modal">
      <div class="content-modal-header">
        <h2 id="modal-title">📄 Caption</h2>
        <button class="content-modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="content-modal-body">
        <div class="content-modal-text" id="modal-text"></div>
      </div>
      <div class="content-modal-footer">
        <button class="copy-btn" id="copy-btn" onclick="copyModalText()">📋 Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    let currentPage = 1;
    let totalCount = 0;
    let modalText = '';
    const perPage = 30;

    function countryClass(c) {
      if (!c) return 'unknown';
      return c.toLowerCase().replace(/\s+/g, '');
    }

    async function loadData() {
      const search = document.getElementById('filter-search').value.trim();
      const topic = document.getElementById('filter-topic').value.trim();
      const country = document.getElementById('filter-country').value;
      const from = document.getElementById('filter-from').value;
      const to = document.getElementById('filter-to').value;

      const params = {
        page: currentPage - 1,
        limit: perPage
      };

      if (search) params.search = search;
      if (topic) params.topic = topic;
      if (country) params.country = country;
      if (from) params.dateFrom = from;
      if (to) params.dateTo = to;

      const qs = new URLSearchParams(params);
      const response = await fetch(`${API_BASE}/webby?${qs}`);
      const result = await response.json();
      const data = result.data || [];
      totalCount = result.total || 0;

      renderTable(data);
      updatePagination();
      document.getElementById('updated-time').textContent = new Date().toLocaleTimeString();
    }

    function renderTable(data) {
      const tbody = document.getElementById('table-body');

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">No data found</td></tr>';
        document.getElementById('showing').textContent = 'No items';
        return;
      }

      document.getElementById('showing').textContent = `Showing ${(currentPage-1)*perPage + 1}-${Math.min(currentPage*perPage, totalCount)} of ${totalCount.toLocaleString()} mentions`;

      tbody.innerHTML = data.map(r => {
        const captionPreview = r.row ? (r.row.length > 120 ? r.row.slice(0, 120) + '...' : r.row) : '';
        const captionEscaped = (r.row || '').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        const isSocial = r.posted_socials && r.posted_socials.trim() !== '';
        const isBlog = r.posted_blog && r.posted_blog.trim() !== '';
        const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '-';
        const cc = countryClass(r.country);
        const isInstaLink = r.link && r.link.includes('instagram.com');

        return `<tr>
          <td class="caption-cell">${r.row ? `<div class="caption-text truncate" onclick="openModal('Caption', \`${captionEscaped}\`)">${captionPreview}</div>` : '<span class="no-data">-</span>'}</td>
          <td class="link-cell">${r.link ? `<a href="${r.link}" target="_blank">${isInstaLink ? '📸 Open' : '🔗 Open'}</a>` : '-'}</td>
          <td><span class="keyword">${r.keyword || '-'}</span></td>
          <td>${r.topic ? `<span class="topic-tag">${r.topic}</span>` : '<span class="no-data">-</span>'}</td>
          <td>${r.country ? `<span class="country-tag ${cc}">${r.country}</span>` : '<span class="no-data">—</span>'}</td>
          <td class="date">${date}</td>
          <td class="actions">
            <button class="action-btn social-btn ${isSocial ? 'active' : ''}" onclick="toggleStatus('${r.id}', 'posted_socials', ${isSocial})">${isSocial ? '✓ Social' : '○ Social'}</button>
            <button class="action-btn blog-btn ${isBlog ? 'active' : ''}" onclick="toggleStatus('${r.id}', 'posted_blog', ${isBlog})">${isBlog ? '✓ Blog' : '○ Blog'}</button>
          </td>
        </tr>`;
      }).join('');
    }

    function openModal(title, text) {
      modalText = text;
      document.getElementById('modal-title').textContent = '📄 ' + title;
      document.getElementById('modal-text').textContent = text;
      document.getElementById('content-modal').classList.add('show');
      document.getElementById('copy-btn').classList.remove('copied');
      document.getElementById('copy-btn').innerHTML = '📋 Copy to Clipboard';
    }

    function closeModal() {
      document.getElementById('content-modal').classList.remove('show');
      modalText = '';
    }

    async function copyModalText() {
      try {
        await navigator.clipboard.writeText(modalText);
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = '✓ Copied!';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 Copy to Clipboard'; }, 2000);
      } catch (err) {
        alert('Failed to copy.');
      }
    }

    document.getElementById('content-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    async function toggleStatus(id, field, currentValue) {
      await fetch(`${API_BASE}/update-status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, table: 'memory', field, value: currentValue })
      });
      loadData();
    }

    function quickFilter(type) {
      clearFilters();
      const now = new Date();
      if (type === '24h') {
        document.getElementById('filter-from').value = new Date(now - 24*60*60*1000).toISOString().split('T')[0];
      } else if (type === '7d') {
        document.getElementById('filter-from').value = new Date(now - 7*24*60*60*1000).toISOString().split('T')[0];
      } else if (type === '30d') {
        document.getElementById('filter-from').value = new Date(now - 30*24*60*60*1000).toISOString().split('T')[0];
      }
      currentPage = 1;
      loadData();
    }

    function clearFilters() {
      document.getElementById('filter-search').value = '';
      document.getElementById('filter-topic').value = '';
      document.getElementById('filter-country').value = '';
      document.getElementById('filter-from').value = '';
      document.getElementById('filter-to').value = '';
      currentPage = 1;
    }

    function changePage(dir) {
      currentPage += dir;
      loadData();
    }

    function updatePagination() {
      const totalPages = Math.ceil(totalCount / perPage);
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages || 1}`;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }

    // Debounced search
    let searchTimeout;
    ['filter-search', 'filter-topic'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => { currentPage = 1; loadData(); }, 500);
      });
    });

    ['filter-country', 'filter-from', 'filter-to'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadData(); });
    });

    // Initialize
    loadData();
    setInterval(loadData, 120000);
  </script>
</body>
</html>
